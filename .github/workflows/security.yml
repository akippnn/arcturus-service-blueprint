name: Security validation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Scan full public history
        shell: bash
        run: |
          set -euo pipefail
          archive="gitleaks_8.30.1_linux_x64.tar.gz"
          curl --fail --silent --show-error --location \
            --output "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/$archive"
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  $archive" | sha256sum -c -
          tar -xzf "$archive" gitleaks
          ./gitleaks git --redact=100 --no-banner .

name: Release candidate

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Verify tag and repository version agree
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          test "${GITHUB_REF_NAME}" = "v${version}" || {
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION ${version}" >&2
            exit 1
          }
          grep -Fq "## [${version}]" CHANGELOG.md
      - name: Verify release commit is on main
        shell: bash
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Create reproducible source archive and bundle
        shell: bash
        run: |
          set -euo pipefail
          prefix="arcturus-service-blueprint-${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="${prefix}/" --output="${prefix}-source.tar.gz" "$GITHUB_SHA"
          git bundle create "${prefix}.bundle" "$GITHUB_REF_NAME"
          sha256sum "${prefix}-source.tar.gz" "${prefix}.bundle" > SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          prerelease=()
          [[ "$GITHUB_REF_NAME" == *-* ]] && prerelease+=(--prerelease)
          gh release create "$GITHUB_REF_NAME" --generate-notes "${prerelease[@]}" arcturus-service-blueprint-*.tar.gz arcturus-service-blueprint-*.bundle SHA256SUMS

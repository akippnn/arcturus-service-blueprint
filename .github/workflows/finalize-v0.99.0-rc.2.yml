name: Finalize clean Service Blueprint v0.99.0-rc.2 release

on:
  push:
    branches: [main]
    paths:
      - '.github/finalize-v0.99.0-rc.2'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    env:
      TARGET_SHA: 5d166eddb5fa162ce5691d42cfe7d20fa16140c9
      RELEASE_TAG: v0.99.0-rc.2
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Verify clean release target
        shell: bash
        run: |
          set -euo pipefail
          git cat-file -e "${TARGET_SHA}^{commit}"
          git merge-base --is-ancestor "$TARGET_SHA" origin/main
          test "$(git show "${TARGET_SHA}:VERSION" | tr -d '[:space:]')" = '0.99.0-rc.2'
          git show "${TARGET_SHA}:CHANGELOG.md" | grep -Fq '## [0.99.0-rc.2]'
          ! git ls-tree -r --name-only "$TARGET_SHA" | grep -Eq '(^|/)finalize-v0\.99\.0-rc\.2|(^|/)publish-v0\.99\.0-rc\.2|(^|/)verify-v0\.99\.0-rc\.2'
      - name: Replace tag and prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release delete "$RELEASE_TAG" --yes --cleanup-tag
          else
            git push origin ":refs/tags/${RELEASE_TAG}" 2>/dev/null || true
          fi
          git tag -d "$RELEASE_TAG" 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "$RELEASE_TAG" "$TARGET_SHA" -m "Arcturus Service Blueprint ${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"

          version="${RELEASE_TAG#v}"
          prefix="arcturus-service-blueprint-${version}"
          git archive --format=tar.gz --prefix="${prefix}/" --output="${prefix}-source.tar.gz" "$TARGET_SHA"
          git bundle create "${prefix}.bundle" "$RELEASE_TAG"
          sha256sum "${prefix}-source.tar.gz" "${prefix}.bundle" > SHA256SUMS

          gh release create "$RELEASE_TAG" \
            --title "Arcturus Service Blueprint ${RELEASE_TAG}" \
            --generate-notes \
            --prerelease \
            "${prefix}-source.tar.gz" \
            "${prefix}.bundle" \
            SHA256SUMS

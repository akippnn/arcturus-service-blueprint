name: Publish Service Blueprint v0.99.0-rc.2

on:
  push:
    branches: [main]
    paths:
      - '.github/release-v0.99.0-rc.2'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Verify release candidate
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          test "$version" = '0.99.0-rc.2'
          grep -Fq "## [${version}]" CHANGELOG.md
          test -f .github/release-v0.99.0-rc.2
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          ! git rev-parse -q --verify "refs/tags/v${version}" >/dev/null
      - name: Create annotated tag
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          tag="v${version}"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "$tag" "$GITHUB_SHA" -m "Arcturus Service Blueprint ${tag}"
          git push origin "refs/tags/${tag}"
      - name: Create reproducible release assets
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          tag="v${version}"
          prefix="arcturus-service-blueprint-${version}"
          git archive --format=tar.gz --prefix="${prefix}/" --output="${prefix}-source.tar.gz" "$GITHUB_SHA"
          git bundle create "${prefix}.bundle" "$tag"
          sha256sum "${prefix}-source.tar.gz" "${prefix}.bundle" > SHA256SUMS
      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          tag="v${version}"
          gh release create "$tag" \
            --title "Arcturus Service Blueprint ${tag}" \
            --generate-notes \
            --prerelease \
            "arcturus-service-blueprint-${version}-source.tar.gz" \
            "arcturus-service-blueprint-${version}.bundle" \
            SHA256SUMS

name: Validate blueprint

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Test idempotent bootstrap
        run: ./tests/test-setup.sh
      - name: Validate deployment contract
        run: ./scripts/arcturus-guard
      - name: Validate shell entrypoints
        run: |
          bash -n scripts/arcturus-setup scripts/arcturus-tool scripts/arcturus-ci \
            scripts/arcturus-lifecycle scripts/arcturus-acceptance scripts/arcturus-host-acceptance \
            scripts/arcturus-release scripts/arcturus-deploy \
            scripts/arcturus-service scripts/arcturus-guard examples/ci/generic.sh
      - name: Validate example JSON
        run: |
          python3 -m json.tool arcturus.release.json >/dev/null
          python3 -m json.tool examples/manifests/worker.json >/dev/null
          python3 -m json.tool examples/manifests/scheduled.json >/dev/null
